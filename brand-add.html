<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Firebase SDK (COMPAT) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <link rel="stylesheet" href="style.css">

  <script src="js/FirebaseConfig.js"></script>
  <div id="header"></div>


  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Inter, sans-serif;
    }

    .container {
      max-width: 620px;
      margin: auto;
      background: #ffffff;
      align-items: center;
      padding: 32px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
    }

    .container h2 {
      font-size: 28px;
      margin-bottom: 10px;
      font-weight: 700;
      text-align: center;
      width: 100%;
    }

    .container input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      background: #f8fafc;
      font-size: 14px;
      transition: all 0.2s ease;
      outline: none;
    }

    .container input:focus {
      border-color: #2563eb;
      background: #fff;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
    }

    .container button {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s ease;
      text-decoration: none;
      text-align: center;
    }

    .btn-save {
      background: #2563eb;
      color: white;
    }

    .btn-save:hover {
      background: #1d4ed8;
    }

    .btn-back:hover {
      background: #e0e0e0;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;

    }

    #footer {
      margin-top: auto;
    }

    .wrapper {
      padding-top: 5vh;
      padding-bottom: 5vh;
    }

    input {
      margin-bottom: 10px;
    }
  </style>



</head>

<body>

  <div class="wrapper" style="padding-top: 100px;">
    <!-- login info  -->
    <a href="login.html" style="text-decoration: none;">
      <p class="InfoLogin" id="user-info" style="text-align: center; color: #000000;  "></p>
    </a>

    <div class="container">
      <h2>Brand Baru</h2>
      <input type="hidden" id="docId">
      <br>
      <input type="text" id="LinkGambar" placeholder="Link Gambar">
      <input type="text" id="Nama" placeholder="Nama">

      <div>
        <button class="btn-save" onclick="simpanData()">Simpan</button>
        <a href="index.html"><button class="btn-back">Batal</button></a>
      </div>
    </div>
  </div>

  <script>
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // ========================
    // CONVERT GOOGLE DRIVE LINK
    // ========================
    function convertDriveLink(url) {
      // Ambil FILE_ID dari URL Google Drive
      const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);

      if (match && match[1]) {
        return `https://lh3.googleusercontent.com/d/${match[1]}`;
      }

      // Jika bukan link drive, kembalikan asli
      return url;
    }

    // ========================
    // CREATE & UPDATE
    // ========================
    function simpanData() {
      // Ambil link asli
      let LinkGambar = document.getElementById("LinkGambar").value;
      //ambil data
      const Nama = document.getElementById("Nama").value;

      // Convert otomatis
      LinkGambar = convertDriveLink(LinkGambar);
      const docId = document.getElementById("docId").value;

      if (!Nama || !LinkGambar) {
        alert("Harap isi semua field");
        return;
      }

      else {
        // CREATE
        db.collection("Brand").add({
          LinkGambar,
          Nama,
          Waktu: new Date()
        })
          .then(() => {
            window.location.href = "index.html?msg=berhasil";// ⬅️ kembali ke halaman awal
          })
          .catch(err => {
            console.error(err);
            alert("Gagal menyimpan data");
          });
      }
    }

  </script>

</body>


<div id="footer"></div>

</html>

<!-- import script -->
<script src="js/LoadHTML.js"></script>
<script src="js/InfoLogin.js"></script>
